{% extends "base.html" %}
{% block title %}تعديل بيانات المريض{% endblock %}
{% block page_title %}✏️ تعديل بيانات المريض: {{ patient['full_name'] }}{% endblock %}
{% block content %}
<style>
.edit-container{max-width:800px;margin:0 auto}
.edit-form{background:#fff;border-radius:15px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:20px}
.form-group{display:flex;flex-direction:column}
.form-label{font-weight:700;color:#1e3c72;margin-bottom:8px;font-size:13px;text-transform:uppercase}
.form-control{padding:12px 16px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;transition:all 0.3s}
.form-control:focus{outline:0;border-color:#1e3c72;box-shadow:0 0 0 3px rgba(30,60,114,0.1)}
.form-actions{display:flex;gap:15px;margin-top:30px}
.btn-save{flex:1;padding:14px;background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.btn-cancel{padding:14px 30px;background:#f3f4f6;color:#1e3c72;border:none;border-radius:8px;text-decoration:none;font-weight:600;cursor:pointer}
</style>

<div class="edit-container">
    <form method="POST" class="edit-form">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" class="form-control" name="full_name" value="{{ patient['full_name'] }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">رقم الهوية الوطنية</label>
                <input type="text" class="form-control" name="national_id" value="{{ patient['national_id'] or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">تاريخ الميلاد</label>
                <input type="date" class="form-control" name="birth_date" value="{{ patient['birth_date'] }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">الجنس</label>
                <select class="form-control" name="gender" required>
                    <option value="male" {% if patient['gender']=='male' %}selected{% endif %}>ذكر</option>
                    <option value="female" {% if patient['gender']=='female' %}selected{% endif %}>أنثى</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">فصيلة الدم</label>
                <select class="form-control" name="blood_type" required>
                    <option value="O+" {% if patient['blood_type']=='O+' %}selected{% endif %}>O+</option>
                    <option value="O-" {% if patient['blood_type']=='O-' %}selected{% endif %}>O-</option>
                    <option value="A+" {% if patient['blood_type']=='A+' %}selected{% endif %}>A+</option>
                    <option value="A-" {% if patient['blood_type']=='A-' %}selected{% endif %}>A-</option>
                    <option value="B+" {% if patient['blood_type']=='B+' %}selected{% endif %}>B+</option>
                    <option value="B-" {% if patient['blood_type']=='B-' %}selected{% endif %}>B-</option>
                    <option value="AB+" {% if patient['blood_type']=='AB+' %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if patient['blood_type']=='AB-' %}selected{% endif %}>AB-</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">رقم الهاتف</label>
                <input type="tel" class="form-control" name="phone" value="{{ patient['phone'] or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">العنوان</label>
                <input type="text" class="form-control" name="address" value="{{ patient['address'] or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">جهة الطوارئ</label>
                <input type="text" class="form-control" name="emergency_contact" value="{{ patient['emergency_contact'] or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label">رقم جهة الطوارئ</label>
                <input type="tel" class="form-control" name="emergency_phone" value="{{ patient['emergency_phone'] or '' }}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">💾 حفظ التغييرات</button>
            <a href="{{ url_for('patient_profile', patient_id=patient['patient_id']) }}" class="btn-cancel">إلغاء</a>
        </div>
    </form>
</div>

{% endblock %}
