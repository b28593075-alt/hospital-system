<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام السجلات الطبية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 50%, #0d6efd 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff; border-radius: 20px; padding: 45px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo .icon {
            width: 80px; height: 80px; background: linear-gradient(135deg, #1a3a5c, #0d6efd);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 2rem; color: #fff;
        }
        .login-logo h4 { color: #1a3a5c; font-weight: 700; margin: 0; }
        .login-logo p { color: #6c757d; font-size: 13px; margin: 5px 0 0; }
        .form-control { padding: 12px 15px; border-radius: 10px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.1); }
        .btn-login {
            background: linear-gradient(135deg, #1a3a5c, #0d6efd);
            border: none; padding: 13px; font-size: 16px; font-weight: 700;
            border-radius: 10px; color: #fff; width: 100%;
        }
        .input-group-text { border-radius: 10px 0 0 10px; border: 2px solid #e9ecef; border-left: none; background: #f8f9fa; }
        .demo-box {
            background: #f0f7ff; border: 1px solid #cce5ff; border-radius: 10px;
            padding: 12px 15px; margin-top: 20px; font-size: 13px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="icon"><i class="bi bi-hospital"></i></div>
        <h4>نظام السجلات الطبية</h4>
        <p>Electronic Medical Records System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:13px">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold text-muted" style="font-size:13px">البريد الإلكتروني</label>
            <input type="email" name="email" class="form-control"
                   placeholder="hospital@example.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold text-muted" style="font-size:13px">كلمة المرور</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>تسجيل الدخول
        </button>
    </form>

    <div class="demo-box">
        <strong><i class="bi bi-info-circle me-1"></i>بيانات تجريبية:</strong><br>
        📧 rasheed@hospital.iq<br>
        🔑 Hospital@123
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
