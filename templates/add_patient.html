{% extends "base.html" %}

{% block title %}إضافة مريض جديد{% endblock %}
{% block page_title %}➕ إضافة مريض جديد{% endblock %}

{% block content %}

<style>
    .form-container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 3px 15px rgba(0,0,0,0.08);
        padding: 35px;
        max-width: 700px;
        margin: 0 auto;
    }

    .form-section {
        margin-bottom: 35px;
    }

    .form-section h5 {
        color: #333;
        font-weight: 700;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 2px solid #f0f0f0;
        font-size: 16px;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 0;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
        font-size: 14px;
    }

    .form-control,
    .form-select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        transition: all 0.3s;
    }

    .form-control:focus,
    .form-select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .dynamic-fields {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    .field-group {
        margin-bottom: 15px;
        padding: 15px;
        background: #fff;
        border-radius: 8px;
        border-right: 3px solid #667eea;
    }

    .field-group:last-child {
        margin-bottom: 0;
    }

    .add-field-btn {
        padding: 10px 16px;
        background: #e3f2fd;
        color: #667eea;
        border: 2px dashed #667eea;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 13px;
    }

    .add-field-btn:hover {
        background: #667eea;
        color: #fff;
        border-style: solid;
    }

    .remove-btn {
        padding: 8px 12px;
        background: #ffebee;
        color: #c62828;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }

    .remove-btn:hover {
        background: #c62828;
        color: #fff;
    }

    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 35px;
    }

    .btn-submit {
        flex: 1;
        padding: 14px;
        background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }

    .btn-cancel {
        padding: 14px 30px;
        background: #f0f0f0;
        color: #333;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
    }

    .btn-cancel:hover {
        background: #e0e0e0;
    }
</style>

<div class="form-container">
    <form method="POST">
        
        <!-- معلومات أساسية -->
        <div class="form-section">
            <h5>📋 معلومات أساسية</h5>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">الاسم الكامل *</label>
                    <input type="text" class="form-control" name="full_name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">تاريخ الميلاد *</label>
                    <input type="date" class="form-control" name="birth_date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">الجنس *</label>
                    <select class="form-select" name="gender" required>
                        <option value="">اختر...</option>
                        <option value="male">ذكر</option>
                        <option value="female">أنثى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">فصيلة الدم *</label>
                    <select class="form-select" name="blood_type" required>
                        <option value="">اختر...</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-control" name="phone">
                </div>
                <div class="form-group">
                    <label class="form-label">العنوان</label>
                    <input type="text" class="form-control" name="address">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">جهة الطوارئ</label>
                    <input type="text" class="form-control" name="emergency_contact">
                </div>
                <div class="form-group">
                    <label class="form-label">رقم جهة الطوارئ</label>
                    <input type="tel" class="form-control" name="emergency_phone">
                </div>
            </div>
        </div>

        <!-- الأمراض المزمنة -->
        <div class="form-section">
            <h5>🏥 الأمراض المزمنة</h5>
            <div id="diseases-container" class="dynamic-fields">
                <div class="field-group">
                    <div class="form-row">
                        <input type="text" class="form-control" name="disease[]" placeholder="اسم المرض">
                        <input type="date" class="form-control" name="disease_date[]">
                    </div>
                </div>
            </div>
            <button type="button" class="add-field-btn" onclick="addDisease()">+ إضافة مرض</button>
        </div>

        <!-- الحساسية -->
        <div class="form-section">
            <h5>⚠️ الحساسية</h5>
            <div id="allergies-container" class="dynamic-fields">
                <div class="field-group">
                    <div class="form-row">
                        <input type="text" class="form-control" name="allergen[]" placeholder="اسم المادة المسببة للحساسية">
                        <input type="text" class="form-control" name="reaction[]" placeholder="رد الفعل">
                    </div>
                </div>
            </div>
            <button type="button" class="add-field-btn" onclick="addAllergy()">+ إضافة حساسية</button>
        </div>

        <!-- الأزرار -->
        <div class="form-actions">
            <button type="submit" class="btn-submit">✅ حفظ المريض</button>
            <a href="{{ url_for('patients_list') }}" class="btn-cancel">إلغاء</a>
        </div>
    </form>
</div>

<script>
    function addDisease() {
        const container = document.getElementById('diseases-container');
        const html = `
            <div class="field-group">
                <div class="form-row">
                    <input type="text" class="form-control" name="disease[]" placeholder="اسم المرض">
                    <input type="date" class="form-control" name="disease_date[]">
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    }

    function addAllergy() {
        const container = document.getElementById('allergies-container');
        const html = `
            <div class="field-group">
                <div class="form-row">
                    <input type="text" class="form-control" name="allergen[]" placeholder="اسم المادة المسببة للحساسية">
                    <input type="text" class="form-control" name="reaction[]" placeholder="رد الفعل">
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    }
</script>

{% endblock %}
