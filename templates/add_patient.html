{% extends "base.html" %}

{% block title %}إضافة مريض جديد{% endblock %}
{% block page_title %}➕ إضافة مريض جديد إلى النظام{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 800px;
        margin: 0 auto;
    }

    .form-section {
        background: #fff;
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 25px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .section-title {
        font-size: 18px;
        font-weight: 700;
        color: #1e3c72;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 2px solid #e5e7eb;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-label {
        font-weight: 700;
        color: #1e3c72;
        margin-bottom: 8px;
        font-size: 13px;
        text-transform: uppercase;
    }

    .form-control {
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
    }

    .form-control:focus {
        outline: none;
        border-color: #1e3c72;
        box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
    }

    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }

    .btn-submit {
        flex: 1;
        padding: 14px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .btn-cancel {
        padding: 14px 30px;
        background: #f3f4f6;
        color: #1e3c72;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
    }
</style>

<div class="form-container">
    <form method="POST">
        <!-- معلومات أساسية -->
        <div class="form-section">
            <h3 class="section-title">📋 المعلومات الأساسية</h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">الاسم الكامل *</label>
                    <input type="text" class="form-control" name="full_name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الهوية الوطنية</label>
                    <input type="text" class="form-control" name="national_id">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">تاريخ الميلاد *</label>
                    <input type="date" class="form-control" name="birth_date" required>
                </div>
                <div class="form-group">
                    <label class="form-label">الجنس *</label>
                    <select class="form-control" name="gender" required>
                        <option value="">اختر...</option>
                        <option value="male">ذكر</option>
                        <option value="female">أنثى</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">فصيلة الدم *</label>
                    <select class="form-control" name="blood_type" required>
                        <option value="">اختر...</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-control" name="phone">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">العنوان</label>
                    <input type="text" class="form-control" name="address" placeholder="الشارع والحي والمحافظة">
                </div>
            </div>
        </div>

        <!-- معلومات الطوارئ -->
        <div class="form-section">
            <h3 class="section-title">🚨 معلومات الطوارئ</h3>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">جهة الاتصال</label>
                    <input type="text" class="form-control" name="emergency_contact">
                </div>
                <div class="form-group">
                    <label class="form-label">رقم جهة الاتصال</label>
                    <input type="tel" class="form-control" name="emergency_phone">
                </div>
            </div>
        </div>

        <!-- الأزرار -->
        <div class="form-actions">
            <button type="submit" class="btn-submit">✅ حفظ المريض الجديد</button>
            <a href="{{ url_for('patients_list') }}" class="btn-cancel">إلغاء</a>
        </div>
    </form>
</div>

{% endblock %}
